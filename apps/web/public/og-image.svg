    <text x="0" y="198" fill="#65717d" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="520">Official LLM picks, round hashes, and methodology</text>
    <text x="0" y="234" fill="#65717d" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="520">for pending and resolved market results.</text>
  </g>
