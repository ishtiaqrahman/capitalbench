<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">CapitalBench social preview</title>
  <desc id="desc">A public benchmark card for one-shot LLM market decisions.</desc>
  <rect width="1200" height="630" fill="#f7f8f6"/>
  <rect x="56" y="56" width="1088" height="518" rx="28" fill="#ffffff" stroke="#d8e0de" stroke-width="2"/>
