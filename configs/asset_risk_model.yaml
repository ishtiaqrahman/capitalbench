version: "1.0"
published_at: "2026-06-07"
description: Shared CapitalBench asset-risk definitions for historical model profiles and live model risk appetite.

scales:
  risk_score_1_5:
    description: Standalone allocation risk used by the existing historical model risk-profile display.
    minimum: 1
    maximum: 5
  risk_on_loading:
    description: Directional loading from defensive positioning (-1) to risk-on positioning (+1).
    minimum: -1
    maximum: 1

regime_groups:
  liquidity_defensive: Cash, short-duration assets, and defensive currencies.
  duration_credit: Government bonds, aggregate bonds, and corporate or emerging-market credit.
  defensive_equity: Lower-beta, income-oriented, and defensive-sector equities.
  broad_cyclical_equity: Broad-market, value, size, cyclical-sector, and industry equity exposure.
  growth_technology: Growth, momentum, technology, AI, and other high-beta thematic equity exposure.
  international_equity: Developed, emerging, regional, and country equity exposure.
  real_assets_inflation: Energy, commodities, metals, materials, and inflation-sensitive real assets.
  crypto: Cryptocurrency proxy exposure.

